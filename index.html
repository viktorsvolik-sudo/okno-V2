<script>
const debugEl = document.getElementById("debug");
const fogEl = document.getElementById("fog");
const worldEl = document.getElementById("world");

// =========================
// 🎨 COLOR ENGINE (NOVÉ)
// =========================
function getBackgroundColor(t, cloud) {

    // základ podle teploty
    let base;

    if (t >= 30) base = [255, 170, 100];     // horko
    else if (t >= 20) base = [255, 210, 120];
    else if (t >= 10) base = [180, 210, 255];
    else if (t > 0) base = [160, 190, 255];
    else base = [200, 220, 255];

    // mlha zesvětlí + desaturuje
    const fog = cloud / 100;
    const mix = fog * 0.6;

    const r = Math.round(base[0] + (255 - base[0]) * mix);
    const g = Math.round(base[1] + (255 - base[1]) * mix);
    const b = Math.round(base[2] + (255 - base[2]) * mix);

    return `rgb(${r},${g},${b})`;
}

// 🌍 STATES

const states = [

    { name: "JASNO", temp: 28, rain: 0, cloud: 10 },

    { name: "OBLAČNO", temp: 16, rain: 0, cloud: 75 },

    { name: "SILNÝ DÉŠŤ", temp: 17, rain: 3, cloud: 95 },

    { name: "SNÍH", temp: -1, rain: 0.5, cloud: 90 }
];

// =========================
// 🎨 VISUAL FIXED
// =========================
function renderVisual(s) {

    const fog = s.cloud / 100;
    const isFullFog = s.cloud >= 95;

    let blurAmount;
    let fogOpacity;

    if (isFullFog) {
        blurAmount = 6;
        fogOpacity = 0.75;
    } else {
        blurAmount = 1.2;
        fogOpacity = 0.08 + fog * 0.12;
    }

    // 🌫️ fog overlay
    fogEl.style.background = `rgba(255,255,255,${fogOpacity})`;

    // 🌍 COLOR (🔥 FIX TADY)
    document.body.style.background = getBackgroundColor(s.temp, s.cloud);

    // 🌫️ atmosphere
    worldEl.style.filter = `
        blur(${blurAmount}px)
        brightness(${1 - fog * 0.25})
        contrast(${1 - fog * 0.15})
    `;

    updateRain(s);
    updateSnow(s);
}
