<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora – V2 debug fixed</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

/* 🌍 SVĚT (rozmazává se) */
#world {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* 🧠 DEBUG UI (OSTRÉ) */
#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;

    font-family: monospace;
    font-size: 13px;
    line-height: 1.4;

    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 10px;
    border-radius: 6px;

    max-width: 320px;
    white-space: pre-line;
    pointer-events: none;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="world">
    <canvas id="rain"></canvas>
    <canvas id="snow"></canvas>
</div>

<div id="debug"></div>

<script>
const TEST_MODE = true;

const debugEl = document.getElementById("debug");
const worldEl = document.getElementById("world");

let testIndex = 0;

// =========================
// 🧪 TEST STATES
// =========================
const testStates = [
    { name: "VEDRO", hour: 14, temperature_2m: 35, precipitation: 0, cloudcover: 5 },
    { name: "JASNO", hour: 13, temperature_2m: 28, precipitation: 0, cloudcover: 10 },
    { name: "POHODOVÝ DEN", hour: 15, temperature_2m: 22, precipitation: 0, cloudcover: 40 },
    { name: "OBLAČNO", hour: 12, temperature_2m: 16, precipitation: 0, cloudcover: 75 },
    { name: "MLHA", hour: 7, temperature_2m: 4, precipitation: 0, cloudcover: 98 },
    { name: "DEŠŤ", hour: 11, temperature_2m: 14, precipitation: 0.3, cloudcover: 85 },
    { name: "SILNÝ DÉŠŤ", hour: 18, temperature_2m: 17, precipitation: 2.5, cloudcover: 95 },
    { name: "BOUŘE", hour: 19, temperature_2m: 19, precipitation: 6, cloudcover: 100 },
    { name: "SNÍH", hour: 2, temperature_2m: -1, precipitation: 0.5, cloudcover: 90 },
    { name: "ZIMA", hour: 5, temperature_2m: -8, precipitation: 0, cloudcover: 60 },
    { name: "NOC", hour: 23, temperature_2m: 6, precipitation: 0, cloudcover: 5 }
];

// =========================
// 🎨 VISUAL SYSTEM
// =========================
function updateVisuals(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    // 🌡️ barva
    let bg;
    if (t >= 30) bg = "#ffb36b";
    else if (t >= 20) bg = "#ffd27a";
    else if (t >= 10) bg = "#cfe3ff";
    else if (t > 0) bg = "#bcd3ff";
    else bg = "#e6f0ff";

    document.body.style.background = bg;

    // ☁️ mlha efekt
    const fog = Math.min(c / 100, 0.9);

    worldEl.style.filter = `
        blur(${fog * 3}px)
        brightness(${1 - fog * 0.25})
    `;

    updateRain(w);
    updateSnow(w);
}

// =========================
// 🧠 DEBUG EXPLANATION
// =========================
function explain(w) {
    const t = w.temperature_2m;
    const p = w.precipitation;
    const c = w.cloudcover;

    let reasons = [];

    if (t >= 30) reasons.push("extrémní teplo → teplý tón");
    else if (t >= 20) reasons.push("teplo → žlutá paleta");
    else if (t >= 10) reasons.push("mírná teplota → studený tón");
    else reasons.push("chlad → modrá/ledový tón");

    if (c > 90) reasons.push("vysoká oblačnost → silný blur (mlha)");
    else if (c > 60) reasons.push("střední oblačnost → jemný blur");
    else reasons.push("nízká oblačnost → ostrý obraz");

    if (p >= 2) reasons.push("silný déšť → husté částice");
    else if (p >= 0.1) reasons.push("slabý déšť → jemné částice");
    else reasons.push("bez srážek");

    if (t <= 0 && p > 0) reasons.push("sníh aktivní systém");

    return reasons.join("\n");
}

// =========================
// 🌧️ RAIN
// =========================
const rainCanvas = document.getElementById("rain");
const rainCtx = rainCanvas.getContext("2d");

let drops = [];
let raining = false;

function resizeRain() {
    rainCanvas.width = window.innerWidth;
    rainCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeRain);
resizeRain();

function initRain() {
    if (drops.length) return;

    for (let i = 0; i < 120; i++) {
        drops.push({
            x: Math.random() * rainCanvas.width,
            y: Math.random() * rainCanvas.height,
            len: Math.random() * 20 + 10,
            speed: Math.random() * 4 + 4
        });
    }
}

function updateRain(w) {
    raining = w.precipitation >= 0.1;
    if (raining) initRain();
}

function drawRain() {
    rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);

    if (raining) {
        rainCtx.strokeStyle = "rgba(255,255,255,0.5)";

        for (let d of drops) {
            rainCtx.beginPath();
            rainCtx.moveTo(d.x, d.y);
            rainCtx.lineTo(d.x, d.y + d.len);
            rainCtx.stroke();

            d.y += d.speed;
            if (d.y > rainCanvas.height) d.y = -20;
        }
    }

    requestAnimationFrame(drawRain);
}

// =========================
// ❄️ SNOW
// =========================
const snowCanvas = document.getElementById("snow");
const snowCtx = snowCanvas.getContext("2d");

let snowflakes = [];
let snowing = false;

function resizeSnow() {
    snowCanvas.width = window.innerWidth;
    snowCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeSnow);
resizeSnow();

function initSnow() {
    if (snowflakes.length) return;

    for (let i = 0; i < 80; i++) {
        snowflakes.push({
            x: Math.random() * snowCanvas.width,
            y: Math.random() * snowCanvas.height,
            r: Math.random() * 2 + 1,
            speed: Math.random() * 1 + 0.5
        });
    }
}

function updateSnow(w) {
    snowing = (w.temperature_2m <= 0 && w.precipitation > 0);
    if (snowing) initSnow();
}

function drawSnow() {
    snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);

    if (snowing) {
        snowCtx.fillStyle = "#fff";

        for (let f of snowflakes) {
            snowCtx.beginPath();
            snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            snowCtx.fill();

            f.y += f.speed;
            if (f.y > snowCanvas.height) f.y = -5;
        }
    }

    requestAnimationFrame(drawSnow);
}

// =========================
// 🎬 RENDER
// =========================
function render() {
    const w = testStates[testIndex];

    updateVisuals(w);

    debugEl.textContent =
`STATE: ${w.name}

TEMP: ${w.temperature_2m}°C
PRECIP: ${w.precipitation}
CLOUD: ${w.cloudcover}
HOUR: ${w.hour}

WHY:
${explain(w)}`;
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") testIndex = (testIndex + 1) % testStates.length;
    if (e.key === "ArrowLeft") testIndex = (testIndex - 1 + testStates.length) % testStates.length;

    render();
});

// =========================
// START
// =========================
render();
drawRain();
drawSnow();
</script>

</body>
</html>
