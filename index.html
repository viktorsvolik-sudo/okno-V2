<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora – TEST / LIVE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    transition: background 0.4s ease;
}

#world {
    position: fixed;
    inset: 0;
}

#fog {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: rgba(255,255,255,0);
    transition: background 0.4s ease;
}

#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    font-family: monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    white-space: pre-line;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="world">
    <canvas id="rain"></canvas>
</div>

<div id="fog"></div>
<div id="debug"></div>

<script>

// =====================================================
// ⚙️ CONFIG
// =====================================================
const MODE = "LIVE"; 
// "TEST" | "LIVE"

const LAT = 50.1071;
const LON = 14.4473;

// =====================================================
// 🧪 TEST DATA
// =====================================================
const testStates = [
    { name:"VEDRO", temp:35, rain:0, cloud:5 },
    { name:"JASNO", temp:28, rain:0, cloud:10 },
    { name:"OBLAČNO", temp:16, rain:0, cloud:75 },
    { name:"MLHA", temp:4, rain:0, cloud:98 },
    { name:"DÉŠŤ", temp:14, rain:0.5, cloud:85 },
    { name:"BOUŘE", temp:19, rain:6, cloud:100 },
    { name:"SNÍH", temp:-1, rain:0.5, cloud:90 }
];

let testIndex = 0;

// =====================================================
// 🌍 STATE NORMALIZATION (KLÍČ SYSTÉMU)
// =====================================================
function normalizeWeather(raw) {
    return {
        name: raw.name || "LIVE",
        temp: raw.temperature_2m ?? raw.temp,
        rain: raw.precipitation ?? raw.rain,
        cloud: raw.cloudcover ?? raw.cloud
    };
}

// =====================================================
// 🌐 OPEN METEO
// =====================================================
async function fetchWeather() {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,precipitation,cloudcover`
    );
    const data = await res.json();

    return normalizeWeather({
        name: "LIVE",
        temperature_2m: data.current.temperature_2m,
        precipitation: data.current.precipitation,
        cloudcover: data.current.cloudcover
    });
}

// =====================================================
// 🌈 COLOR ENGINE
// =====================================================
function getBackgroundColor(t, cloud) {

    let base =
        t >= 30 ? [255,170,100] :
        t >= 20 ? [255,210,120] :
        t >= 10 ? [180,210,255] :
        t > 0 ? [160,190,255] :
        [200,220,255];

    const mix = (cloud/100) * 0.6;

    return `rgb(
        ${Math.round(base[0] + (255-base[0])*mix)},
        ${Math.round(base[1] + (255-base[1])*mix)},
        ${Math.round(base[2] + (255-base[2])*mix)}
    )`;
}

// =====================================================
// 🌫️ VISUAL SYSTEM
// =====================================================
function renderVisual(s) {

    const fog = s.cloud / 100;
    const isFullFog = s.cloud >= 95;

    let blur = 0;

    // 🌧️ déšť 10%
    if (s.rain > 0 && !isFullFog) blur = 0.6;

    // ⛈️ bouře 15%
    if (s.name === "BOUŘE") blur = 1;

    // 🌫️ mlha override
    if (isFullFog) blur = 6;

    document.body.style.background = getBackgroundColor(s.temp, s.cloud);

    fog.style = fog; // (placeholder fix)

    document.getElementById("fog").style.background =
        `rgba(255,255,255,${isFullFog ? 0.75 : fog*0.2})`;

    document.getElementById("world").style.filter = `
        blur(${blur}px)
        brightness(${1 - fog*0.25})
        contrast(${1 - fog*0.15})
    `;
}

// =====================================================
// 🌧️ RAIN (simplified but stable)
// =====================================================
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

let drops = [];
let raining = false;

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

function initRain() {
    drops = [];
    for (let i=0;i<300;i++){
        drops.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            l:Math.random()*40+20,
            s:Math.random()*8+4
        });
    }
}

function drawRain() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (raining) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 1.5;

        for (let d of drops) {
            ctx.beginPath();
            ctx.moveTo(d.x,d.y);
            ctx.lineTo(d.x,d.y+d.l);
            ctx.stroke();

            d.y += d.s;
            if (d.y > canvas.height) d.y = -20;
        }
    }

    requestAnimationFrame(drawRain);
}

// =====================================================
// 🎮 DATA SOURCE SWITCH
// =====================================================
let currentWeather = null;

async function updateData() {

    if (MODE === "TEST") {
        currentWeather = normalizeWeather(testStates[testIndex]);
    }

    if (MODE === "LIVE") {
        currentWeather = await fetchWeather();
    }

    raining = currentWeather.rain > 0.1;

    if (raining && drops.length === 0) initRain();

    renderVisual(currentWeather);

    document.getElementById("debug").textContent =
`${MODE}
${currentWeather.name}
TEMP: ${currentWeather.temp}
RAIN: ${currentWeather.rain}
CLOUD: ${currentWeather.cloud}`;
}

// =====================================================
// 🎮 CONTROLS
// =====================================================
addEventListener("keydown", e => {
    if (MODE === "TEST") {
        if (e.key === "ArrowRight") testIndex++;
        if (e.key === "ArrowLeft") testIndex--;

        testIndex = (testIndex + testStates.length) % testStates.length;

        updateData();
    }
});

// =====================================================
// 🚀 START
// =====================================================
setInterval(updateData, MODE === "LIVE" ? 60000 : 999999);
updateData();
drawRain();

</script>

</body>
</html>
