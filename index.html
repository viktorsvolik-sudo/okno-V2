<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora – Time Simulation</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    transition: background 0.4s ease;
}

#world {
    position: fixed;
    inset: 0;
}

#fog {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    font-family: monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    white-space: pre-line;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="world">
    <canvas id="rain"></canvas>
</div>

<div id="fog"></div>
<div id="debug"></div>

<script>

// =====================================================
// ⚙️ MODE
// =====================================================
const MODE = "TEST";

// =====================================================
// 🧪 TEST TIME CONTROL (NEW)
// shift in HOURS
// e.g. -6 = make it night, +6 = future day
// =====================================================
const TEST_TIME_OFFSET = -0; 

// =====================================================
// 🧪 TEST DATA
// =====================================================
const testStates = [
    { name:"VEDRO", temp:35, rain:0, cloud:5, wind:0 },
    { name:"DÉŠŤ", temp:14, rain:0.5, cloud:85, wind:0.8 },
    { name:"BOUŘE", temp:19, rain:6, cloud:100, wind:1 }
];

let testIndex = 0;

// =====================================================
// 🧠 TIME SYSTEM (UPDATED)
// =====================================================
function getTimeInfo() {
    const now = new Date();

    let simulated = new Date(now);

    if (MODE === "TEST") {
        simulated.setHours(simulated.getHours() + TEST_TIME_OFFSET);
    }

    const hour = simulated.getHours();
    const min = simulated.getMinutes();

    return {
        hour,
        min,
        isNight: (hour >= 20 || hour < 6),
        formatted: `${String(hour).padStart(2,"0")}:${String(min).padStart(2,"0")}`
    };
}

// =====================================================
// 🌍 VISUAL SYSTEM (ONLY TIME AFFECTS LIGHT)
// =====================================================
function renderVisual(s) {

    const time = getTimeInfo();

    let bg =
        s.temp > 25 ? "rgb(255,200,140)" :
        s.temp > 10 ? "rgb(170,200,255)" :
        "rgb(120,160,220)";

    // 🌙 NIGHT SHIFT
    if (time.isNight) {
        bg = darken(bg, 0.55);
    }

    document.body.style.background = bg;
}

// =====================================================
// 🌑 DARKEN
// =====================================================
function darken(rgb, f) {
    const n = rgb.match(/\d+/g).map(Number);
    return `rgb(${n[0]*f},${n[1]*f},${n[2]*f})`;
}

// =====================================================
// 🎮 DATA LOOP
// =====================================================
let currentWeather = null;

function update() {

    currentWeather = testStates[testIndex];

    const time = getTimeInfo();

    document.getElementById("debug").textContent =
`${currentWeather.name}
TIME: ${time.formatted} (${MODE === "TEST" ? "SIM" : "REAL"})
TEMP: ${currentWeather.temp}
RAIN: ${currentWeather.rain}
CLOUD: ${currentWeather.cloud}
WIND: ${currentWeather.wind}
OFFSET: ${MODE === "TEST" ? TEST_TIME_OFFSET : 0}`;
}

// =====================================================
// 🎮 CONTROLS
// =====================================================
addEventListener("keydown", e => {

    if (e.key === "ArrowRight") testIndex++;
    if (e.key === "ArrowLeft") testIndex--;

    testIndex = (testIndex + testStates.length) % testStates.length;
    update();
});

// =====================================================
// 🚀 START
// =====================================================
update();

</script>

</body>
</html>
