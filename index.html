<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora – V2 atmosphere</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

/* 🌍 SVĚT */
#world {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* 🌫️ MLHA VRSTVA (NOVÁ) */
#fog {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
    background: rgba(255,255,255,0);
    transition: background 0.5s ease;
}

/* 🧠 DEBUG */
#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;

    font-family: monospace;
    font-size: 13px;

    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px;
    border-radius: 6px;

    white-space: pre-line;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="world">
    <canvas id="rain"></canvas>
    <canvas id="snow"></canvas>
</div>

<div id="fog"></div>
<div id="debug"></div>

<script>
const debugEl = document.getElementById("debug");
const fogEl = document.getElementById("fog");
const worldEl = document.getElementById("world");

let testIndex = 0;
let lastRainState = false;

// =========================
// 🧪 STATES
// =========================
const testStates = [
    { name: "VEDRO", hour: 14, temperature: 35, precipitation: 0, cloud: 5 },
    { name: "JASNO", hour: 13, temperature: 28, precipitation: 0, cloud: 10 },
    { name: "POLOJASNO", hour: 15, temperature: 22, precipitation: 0, cloud: 40 },
    { name: "OBLAČNO", hour: 12, temperature: 16, precipitation: 0, cloud: 75 },
    { name: "MLHA", hour: 7, temperature: 4, precipitation: 0, cloud: 98 },
    { name: "DÉŠŤ", hour: 11, temperature: 14, precipitation: 0.3, cloud: 85 },
    { name: "SILNÝ DÉŠŤ", hour: 18, temperature: 17, precipitation: 3, cloud: 95 },
    { name: "BOUŘE", hour: 19, temperature: 19, precipitation: 6, cloud: 100 },
    { name: "SNÍH", hour: 2, temperature: -1, precipitation: 0.5, cloud: 90 }
];

// =========================
// 🎨 VISUAL
// =========================
function updateVisuals(w) {

    const t = w.temperature;
    const c = w.cloud;

    // 🌡️ barva
    let bg =
        t >= 30 ? "#ffb36b" :
        t >= 20 ? "#ffd27a" :
        t >= 10 ? "#cfe3ff" :
        t > 0 ? "#bcd3ff" : "#e6f0ff";

    document.body.style.background = bg;

    // 🌫️ VÝRAZNÁ MLHA (NOVĚ)
    const fog = c / 100;

    // blur + světelný útlum
    worldEl.style.filter = `
        blur(${fog * 5}px)
        brightness(${1 - fog * 0.35})
        contrast(${1 - fog * 0.2})
    `;

    // extra mlžná vrstva (dŮLEŽITÉ)
    fogEl.style.background = `rgba(255,255,255,${fog * 0.55})`;

    updateRain(w);
    updateSnow(w);
}

// =========================
// 🌧️ RAIN (VÝRAZNĚJŠÍ)
// =========================
const rainCanvas = document.getElementById("rain");
const rainCtx = rainCanvas.getContext("2d");

let drops = [];
let raining = false;

function resize() {
    rainCanvas.width = window.innerWidth;
    rainCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function initRain() {
    drops = [];

    // 🔥 více kapek
    for (let i = 0; i < 220; i++) {
        drops.push({
            x: Math.random() * rainCanvas.width,
            y: Math.random() * rainCanvas.height,
            len: Math.random() * 30 + 20,   // delší kapky
            speed: Math.random() * 6 + 5
        });
    }
}

function updateRain(w) {
    const state = w.precipitation >= 0.1;

    if (state && !lastRainState) initRain();

    raining = state;
    lastRainState = state;
}

function drawRain() {
    rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);

    if (raining) {
        rainCtx.strokeStyle = "rgba(255,255,255,0.9)"; // 🔥 výraznější

        for (let d of drops) {
            rainCtx.lineWidth = 1.2;

            rainCtx.beginPath();
            rainCtx.moveTo(d.x, d.y);
            rainCtx.lineTo(d.x, d.y + d.len);
            rainCtx.stroke();

            d.y += d.speed;
            if (d.y > rainCanvas.height) d.y = -20;
        }
    }

    requestAnimationFrame(drawRain);
}

// =========================
// ❄️ SNOW (stejné, lehce zesílené)
function updateSnow(w) {
    snowing = (w.temperature <= 0 && w.precipitation > 0);
}

// (zkráceno – zůstává tvoje verze)
const snowCanvas = document.getElementById("snow");
const snowCtx = snowCanvas.getContext("2d");

let snowflakes = [];
let snowing = false;

function drawSnow() {
    snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);

    if (snowing) {
        snowCtx.fillStyle = "#fff";

        for (let f of snowflakes) {
            snowCtx.beginPath();
            snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            snowCtx.fill();

            f.y += f.speed;
            if (f.y > snowCanvas.height) f.y = -5;
        }
    }

    requestAnimationFrame(drawSnow);
}

// =========================
// RENDER
// =========================
function render() {
    const w = testStates[testIndex];

    updateVisuals(w);

    debugEl.textContent =
`STATE: ${w.name}
TEMP: ${w.temperature}
PRECIP: ${w.precipitation}
CLOUD: ${w.cloud}`;
}

// =========================
// CONTROL
// =========================
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") testIndex = (testIndex + 1) % testStates.length;
    if (e.key === "ArrowLeft") testIndex = (testIndex - 1 + testStates.length) % testStates.length;
    render();
});

// =========================
// START
// =========================
render();
drawRain();
drawSnow();
</script>

</body>
</html>
