<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Okno do dvora - Storm System</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    transition: background 0.4s ease;
}

#world {
    position: fixed;
    inset: 0;
}

/* SHADOWS */
#shadows {
    position: fixed;
    inset: 0;
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.55;
    filter: blur(18px);
}

#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    font-family: monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    white-space: pre-line;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="world">
    <canvas id="shadows"></canvas>
    <canvas id="clouds"></canvas>
    <canvas id="rain"></canvas>
    <canvas id="fog"></canvas>
    <canvas id="lightning"></canvas>
</div>

<div id="debug"></div>

<script>

// =====================================================
// MODE
// =====================================================
const MODE = "TEST";

// =====================================================
// DAYLIGHT SETTINGS
// =====================================================
const SUNRISE_HOUR = 6;
const SUNSET_HOUR = 20;
const TWILIGHT_LENGTH = 2;

// =====================================================
// TEST DATA
// =====================================================
const testStates = [
    { name:"VEDRO", temp:35, rain:0, cloud:5, wind:0, hour:15 },
    { name:"JASNO", temp:28, rain:0, cloud:10, wind:0.2, hour:9 },
    { name:"POLOJASNO", temp:24, rain:0, cloud:35, wind:0.15, hour:16 },
    { name:"JASNA NOC", temp:12, rain:0, cloud:0, wind:0.1, hour:1 },
    { name:"OBLACNO", temp:16, rain:0, cloud:75, wind:-0.5, hour:18 },
    { name:"MLHA", temp:4, rain:0, cloud:98, wind:0, hour:5 },
    { name:"DEST", temp:14, rain:0.5, cloud:85, wind:0.8, hour:13 },
    { name:"BOURE", temp:19, rain:6, cloud:100, wind:1, hour:21 },
    { name:"SNIH", temp:-3, rain:0.7, cloud:100, wind:-0.3, hour:9 }
];

let testIndex = 0;

// =====================================================
// HELPERS
// =====================================================
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function lerp(a,b,t){return a+(b-a)*t;}

// =====================================================
// SHADOW SYSTEM
// =====================================================
const shadowsCanvas = document.getElementById("shadows");
const shctx = shadowsCanvas.getContext("2d");

let shadowBands = [];
let shadowState = { density:0, wind:0, storm:0, daylight:1 };

function resizeShadows(){
    shadowsCanvas.width = innerWidth;
    shadowsCanvas.height = innerHeight;
}
addEventListener("resize", resizeShadows);
resizeShadows();

function createShadowBand(i=0){
    const layer = i%3;
    return {
        x: Math.random()*innerWidth,
        y: innerHeight*(0.3+layer*0.12),
        w: Math.random()*800+800,
        h: Math.random()*140+120,
        speed: 0.02+Math.random()*0.04,
        wobble: Math.random()*Math.PI*2,
        layer
    };
}

function initShadows(){
    shadowBands=[];
    for(let i=0;i<6;i++) shadowBands.push(createShadowBand(i));
}

function updateShadowState(w){
    shadowState.density = clamp((w.cloud-20)/80,0,1);
    shadowState.wind = w.wind||0;
    shadowState.storm = w.name==="BOURE"?1:0;
}

function drawShadowsFrame(t){
    shctx.clearRect(0,0,innerWidth,innerHeight);

    const time = t*0.001;
    const baseAlpha = 0.05 + shadowState.density*0.2;

    for(const b of shadowBands){
        b.x += b.speed + shadowState.wind*0.1;

        if(b.x > innerWidth+300) b.x = -300;

        const alpha = baseAlpha*(0.8+b.layer*0.1);

        const g = shctx.createRadialGradient(
            b.x,b.y,50,
            b.x,b.y,b.w
        );
        g.addColorStop(0,`rgba(0,0,0,${alpha})`);
        g.addColorStop(1,"rgba(0,0,0,0)");

        shctx.fillStyle=g;
        shctx.beginPath();
        shctx.ellipse(b.x,b.y,b.w,b.h,0,0,Math.PI*2);
        shctx.fill();
    }

    requestAnimationFrame(drawShadowsFrame);
}

initShadows();
requestAnimationFrame(drawShadowsFrame);

// =====================================================
// BASIC VISUAL (zbytek nechávám jak máš)
// =====================================================
let currentWeather=null;

function renderVisual(s){
    const base = 255 - s.cloud*1.2;
    document.body.style.background = `rgb(${base},${base},${base+10})`;
}

// =====================================================
// LOOP
// =====================================================
function updateData(){
    currentWeather = testStates[testIndex];
    renderVisual(currentWeather);
    updateShadowState(currentWeather);
}

addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") testIndex++;
    if(e.key==="ArrowLeft") testIndex--;
    testIndex = (testIndex+testStates.length)%testStates.length;
    updateData();
});

updateData();

</script>

</body>
</html>
